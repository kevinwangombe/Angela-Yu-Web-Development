<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid Placement</title>
    <style>
      body {
        padding: 0;
        margin: 0;
      }

      .container {
        height: 100vh;
        display: grid;
        gap: 3rem;
        grid-template-columns: 1fr 1fr 1.5fr;
        grid-template-rows: 1fr 1fr;

        .item {
          font-size: 5rem;
          color: white;
          font-family: Arial, Helvetica, sans-serif;
          background-color: blueviolet;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        .cowboy {
          background-color: #00b9ff;
          grid-column: span 2;
        }

        .astronaut {
          background-color: #03989e;
          order: 1; /* to make it appear after the book  and follow the goal2 image */
          grid-column: span 2; /* to make it ocupy two line of squares and make it look like the goal2 image */
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="item cowboy">🤠</div>
      <div class="item astronaut">👨‍🚀</div>
      <div class="item book">📖</div>
    </div>
  </body>
</html>
