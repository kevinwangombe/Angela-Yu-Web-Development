<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Self Closing tags</title>
  </head>
  <body>
    <h1>Self Closing tags</h1>
    <p>
      Some HTML tags are self-closing, meaning they do not require a closing
      tag. Examples include:
    </p>
    <ul>
      <li><code>&lt;img&gt;</code> - for images</li>
      <li><code>&lt;br&gt;</code> - for line breaks</li>
      <li><code>&lt;hr&gt;</code> - for horizontal rules</li>
      <li><code>&lt;input&gt;</code> - for form inputs</li>
    </ul>
  </body>
</html>
