<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heading Element</title>
  </head>
  <body>
    <h1>This is a Heading</h1>
    <!-- The largest and most important heading -->
    <h2>This is a Subheading</h2>
    <h3>This is a Third-Level Heading</h3>
    <h4>This is a Fourth-Level Heading</h4>
    <h5>This is a Fifth-Level Heading</h5>
    <h6>This is a Sixth-Level Heading</h6>

    <!-- smallest and least important heading -->
    <!-- Headers keep reducing from H1 to H6  -->
  </body>
</html>
